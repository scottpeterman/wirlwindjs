# Neighbors collection - Cisco IOS / IOS-XE
#
# Uses "show lldp neighbors detail" for the topology graph panel.
# LLDP field names match the Arista driver's normalize expectations.
# Requires "lldp run" on the Cisco device.
#
# NTC TextFSM template: cisco_ios_show_lldp_neighbors_detail.textfsm
# Returns (lowercased):
#   neighbor, chassis_id, mgmt_address, neighbor_description,
#   neighbor_interface, local_interface, capabilities, neighbor_count
#
# The driver strips FQDN, normalizes platform strings, shortens
# interface names, and cleans up capabilities for graph display.

command: "show lldp neighbors detail"
interval: 300

parsers:
  - type: textfsm
    templates:
      - cisco_ios_show_lldp_neighbors_detail.textfsm

normalize:
  device_id: neighbor
  local_intf: local_interface
  remote_intf: neighbor_interface
  mgmt_ip: mgmt_address
  platform: neighbor_description