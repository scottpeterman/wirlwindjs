# Memory collection - Cisco IOS / IOS-XE
#
# Uses "show processes memory sorted" which gives:
#   - Processor pool summary: Total, Used, Free
#   - I/O pool summary: Total, Used, Free
#   - Per-process rows: PID, TTY, Allocated, Freed, Holding, Getbufs, Retbufs, Process
#
# Actual output:
#   Processor Pool Total:  873977468  Used:  335498564  Free:  538478904
#   I/O Pool Total:         33554432  Used:    1785972  Free:   31768460
#    PID TTY  Allocated      Freed    Holding    Getbufs    Retbufs Process
#      0   0  530498572  198498424  186216024          0          0 *Init*
#      1   0      19640      19236       8408          0          0 Chunk Manager
#
# TextFSM globals (Filldown, lowercased):
#   processor_total, processor_used, processor_free,
#   io_total, io_used, io_free
#
# TextFSM per-process rows (lowercased):
#   process_id, tty, allocated, freed, holding, getbufs, retbufs, process_name
#
# The driver computes used_pct from processor pool values.
# Per-process holding is cross-referenced into CPU process list
# via mergeMemoryIntoProcesses().

command: "show processes memory sorted"
interval: 30

parsers:
  - type: textfsm
    templates:
      - cisco_ios_show_processes_memory_sorted.textfsm

  # Fallback: regex captures the processor pool summary line
  - type: regex
    pattern: 'Processor Pool Total:\s+(\d+)\s+Used:\s+(\d+)\s+Free:\s+(\d+)'
    flags: DOTALL
    groups:
      processor_total: 1
      processor_used: 2
      processor_free: 3

normalize:
  total_bytes: processor_total
  used_bytes: processor_used
  free_bytes: processor_free