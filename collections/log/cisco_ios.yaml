# Log collection - Cisco IOS / IOS-XE
#
# Uses "show logging" which dumps the logging buffer.
# The driver's parseCiscoLog() handles raw syslog parsing
# rather than TextFSM — syslog is easier to regex directly.
#
# Actual output:
#   Syslog logging: enabled (0 messages dropped, 0 messages rate-limited, ...)
#   ...
#   Log Buffer (65536 bytes):
#   *Mar  1 00:00:00.000: %SYS-5-CONFIG_I: Configured from console by admin
#   *Mar  1 00:01:23.456: %LINEPROTO-5-UPDOWN: Line protocol on Interface Gi0/1, changed state to up
#   *Mar  1 00:02:00.000: %CDP-4-DUPLEX_MISMATCH: duplex mismatch discovered on Gi0/2
#   *Jun 15 14:30:00.123 UTC: %OSPF-5-ADJCHG: Process 1, Nbr 10.0.0.2 on Gi0/0 from LOADING to FULL
#
# Parser: 'none' — raw output is passed to the driver's log
# post-processor which uses parseCiscoLog() for structured parsing.
# Falls back to raw line display if no syslog patterns match.

command: "show logging"
interval: 30

parsers:
  - type: none