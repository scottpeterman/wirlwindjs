# Interface Detail collection - Cisco IOS / IOS-XE
#
# Uses "show interfaces" for full per-interface statistics.
# Heavier command — runs less frequently than interfaces description.
#
# Actual output per interface block:
#   GigabitEthernet0/0 is up, line protocol is up
#     Hardware is iGbE, address is 0050.56ab.1234 (bia 0050.56ab.1234)
#     Description: TO core1 Gi0/1
#     Internet address is 10.0.0.1/30
#     MTU 1500 bytes, BW 1000000 Kbit/sec, DLY 10 usec,
#     ...
#     5 minute input rate 23000 bits/sec, 18 packets/sec
#     5 minute output rate 45000 bits/sec, 31 packets/sec
#        1234567 packets input, 987654321 bytes, 0 no buffer
#        0 input errors, 0 CRC, 0 frame, 0 overrun, 0 ignored
#        1234000 packets output, 876543210 bytes, 0 underruns
#        0 output errors, 0 collisions, 0 interface resets
#
# TextFSM rows (lowercased):
#   interface, link_status, protocol_status, hardware_type,
#   mac_address, bia, description, ip_address, mtu, bandwidth,
#   duplex, speed, last_link_flapped, input_rate, output_rate,
#   input_rate_pps, output_rate_pps, input_packets, output_packets,
#   input_errors, output_errors, crc, runts, giants
#
# The driver normalizes bandwidth/rate strings to numeric bps
# and computes utilization_pct.

command: "show interfaces"
interval: 60
timeout: 30000

parsers:
  - type: textfsm
    templates:
      - cisco_ios_show_interfaces.textfsm

normalize:
  input_rate_raw: input_rate
  output_rate_raw: output_rate
  bandwidth_raw: bandwidth
  in_errors: input_errors
  out_errors: output_errors
  crc_errors: crc
  link_status: status