# Interfaces collection - Cisco IOS / IOS-XE
#
# Uses "show interfaces description" for the status table panel.
# Quick, lightweight command — runs every cycle for up/down tracking.
#
# Actual output:
#   Interface                      Status         Protocol Description
#   Gi0/0                          up             up       TO core1 Gi0/1
#   Gi0/1                          up             up       TO dist1 Gi0/0
#   Gi0/2                          admin down     down
#   Lo0                            up             up       Router-ID
#
# TextFSM rows (lowercased):
#   interface, status, protocol, description
#
# No driver post-processing needed — BaseDriver passes through.
# The dashboard reads status for up/down/admin-down counts.

command: "show interfaces description"
interval: 60

parsers:
  - type: textfsm
    templates:
      - cisco_ios_show_interfaces_description.textfsm

  # Fallback: regex per line (header-skipping pattern)
  - type: regex
    pattern: '^(\S+)\s+(up|down|admin down|administratively down)\s+(up|down)\s*(.*)$'
    flags: MULTILINE
    groups:
      interface: 1
      status: 2
      protocol: 3
      description: 4